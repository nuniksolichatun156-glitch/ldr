<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart IoT Dashboard - TJKT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #0b132b;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        header h1 {
            color: #4facfe;
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(79, 172, 254, 0.5);
        }

        header p {
            color: #8892b0;
            font-size: 1rem;
            margin-top: 5px;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .card {
            background: #1c2541;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid #3a506b;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            font-size: 1.2rem;
            color: #a1b0cc;
            margin-bottom: 15px;
        }

        .value {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .value.cyan { color: #00f2fe; text-shadow: 0 0 10px rgba(0, 242, 254, 0.4); }
        .value.green { color: #00ff87; text-shadow: 0 0 10px rgba(0, 255, 135, 0.4); }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            background: #2a3b5c;
            color: #fff;
        }

        .status-on { background: #00ff87; color: #000; box-shadow: 0 0 10px #00ff87; }
        .status-off { background: #ff3366; color: #fff; box-shadow: 0 0 10px #ff3366; }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-on {
            background-color: #00ff87;
            color: #000;
        }
        .btn-on:hover { box-shadow: 0 0 15px #00ff87; }

        .btn-off {
            background-color: #ff3366;
            color: #fff;
        }
        .btn-off:hover { box-shadow: 0 0 15px #ff3366; }

        footer {
            margin-top: auto;
            padding-top: 40px;
            color: #5c6b8a;
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>Smart Control Center</h1>
        <p>Sistem Terpadu IoT - Project Based Learning TJKT</p>
    </header>

    <div class="dashboard-container">
        <div class="card">
            <h2>Sensor Cahaya (LDR)</h2>
            <div class="value cyan" id="val-cahaya">0</div>
            <div class="status-badge" id="badge-lampu">Lampu: Menunggu...</div>
            <div class="btn-container">
                <button class="btn-on" onclick="kontrolAlat('lampu', '1')">ON</button>
                <button class="btn-off" onclick="kontrolAlat('lampu', '0')">OFF</button>
            </div>
        </div>

        <div class="card">
            <h2>Kelembaban Tanah</h2>
            <div class="value green" id="val-tanah">0</div>
            <div class="status-badge" id="badge-pompa">Pompa: Menunggu...</div>
            <div class="btn-container">
                <button class="btn-on" onclick="kontrolAlat('pompa', '1')">ON</button>
                <button class="btn-off" onclick="kontrolAlat('pompa', '0')">OFF</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Teaching Factory TJKT | Powered by ESP32-S3 & Flask</p>
    </footer>

    <script>
        // Fungsi untuk mengambil data sensor dari API Flask setiap 1 detik
        function fetchData() {
            fetch('/api/data')
                .then(response => response.json())
                .then(data => {
                    // Update nilai angka
                    document.getElementById('val-cahaya').innerText = data.cahaya;
                    document.getElementById('val-tanah').innerText = data.kelembaban;

                    // Update badge status lampu
                    const badgeLampu = document.getElementById('badge-lampu');
                    badgeLampu.innerText = "Lampu: " + data.status_lampu;
                    if(data.status_lampu.trim() === "ON") {
                        badgeLampu.className = "status-badge status-on";
                    } else {
                        badgeLampu.className = "status-badge status-off";
                    }

                    // Update badge status pompa
                    const badgePompa = document.getElementById('badge-pompa');
                    badgePompa.innerText = "Pompa: " + data.status_pompa;
                    if(data.status_pompa.trim() === "ON") {
                        badgePompa.className = "status-badge status-on";
                    } else {
                        badgePompa.className = "status-badge status-off";
                    }
                })
                .catch(error => console.error('Error fetching data:', error));
        }

        // Fungsi untuk mengirim perintah kontrol (ON/OFF) ke API Flask
        function kontrolAlat(device, action) {
            fetch('/api/control', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    device: device,
                    action: action
                })
            })
            .then(response => response.json())
            .then(data => console.log("Command sent:", data))
            .catch(error => console.error('Error sending command:', error));
        }

        // Jalankan fetchData setiap 1000ms (1 detik)
        setInterval(fetchData, 1000);
        
        // Panggil sekali saat halaman pertama dimuat
        fetchData();
    </script>

</body>
</html>
